<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGB Color Model Example</title>
<style>
    body {
        font-family: Arial, sans-serif;
        display: flex;
        gap: 20px;
        padding: 20px;
    }

    .color-box {
        width: 150px;
        height: 150px;
        border: 2px solid black;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-weight: bold;
        font-size: 16px;
    }

    /* Contoh warna RGB */
    .red {
        background-color: rgb(255, 0, 0);  /* Merah */
    }

    .green {
        background-color: rgb(0, 255, 0);  /* Hijau */
    }

    .blue {
        background-color: rgb(0, 0, 255);  /* Biru */
    }

    .purple {
        background-color: rgb(128, 0, 128); /* Ungu */
    }
</style>
</head>
<body>

<div class="color-box red">RGB(255,0,0)</div>
<div class="color-box green">RGB(0,255,0)</div>
<div class="color-box blue">RGB(0,0,255)</div>
<div class="color-box purple">RGB(128,0,128)</div>

</body>
</html>

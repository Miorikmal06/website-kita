<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Background + Front Images</title>
<style>
    body {
        margin: 0;
        padding: 0;
        height: 100vh;
        font-family: Arial, sans-serif;
        background-image: url('https://i.pinimg.com/1200x/a1/58/d6/a158d6ee85487fb859210a943e423e75.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        position: relative;
        overflow: hidden;
    }

    .front-image {
        position: absolute;
        height: auto;
        z-index: 10;
    }

    /* 3 gambar depan */
    .front-image.first {
        top: 50%;
        left: 20%;
        width: 200px;
        transform: translate(-50%, -50%);
    }

    .front-image.second {
        top: 50%;
        left: 50%;
        width: 250px;
        transform: translate(-50%, -50%);
    }

    .front-image.third {
        top: 50%;
        left: 80%;
        width: 200px;
        transform: translate(-50%, -50%);
    }
</style>
</head>
<body>

<img src="https://static.wikia.nocookie.net/upinipin/images/a/a0/5_tok_dalang.png/revision/latest/thumbnail/width/360/height/450?cb=20170113182103" alt="Tok Dalang 1" class="front-image first">
<img src="1.png" alt="Tok Dalang 2" class="front-image second">
<img src="3.png" alt="Tok Dalang 3" class="front-image third">

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Selector Margin & Padding</title>
<style>
    /* Semua <p> ikut font asas */
    p {
        font-family: Arial, sans-serif;
        font-size: 20px;
    }

    /* Group 1 - margin & padding 0 */
    .group1 {
        margin: 0px;
        padding: 0px;
    }

    /* Group 2 - margin & padding 20px */
    .group2 {
        margin: 20px;
        padding: 20px;
    }

    /* Group 3 - margin & padding 50px */
    .group3 {
        margin: 50px;
        padding: 50px;
    }
</style>
</head>
<body>

<div class="group1">
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
</div>

<div class="group2">
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
</div>

<div class="group3">
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
</div>

</body>
</html>

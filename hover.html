<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Pseudo-Classes in Separate Boxes</title>
<style>
    .box {
        display: inline-block;
        width: 200px;
        text-align: center;
        font-family: Arial, sans-serif;
        font-size: 20px;
        padding: 20px;
        margin: 10px;
        border: 2px solid black;
        border-radius: 5px;
    }

    /* Default link */
    #link-box a:link {
        color: blue;
    }

    /* Visited link */
    #visited-box a:visited {
        color: purple;
    }

    /* Hover link */
    #hover-box a:hover {
        color: rgb(255, 0, 204);
        background-color: #f0f0f0;
    }

    /* Active link */
    #active-box a:active {
        color: red;
        background-color: #ffe4e1;
    }
</style>
</head>
<body>

<h2>Link Pseudo-Classes Demonstration</h2>

<div id="link-box" class="box">
    <p>Link (:link)</p>
    <a href="#">Click Me</a>
</div>

<div id="visited-box" class="box">
    <p>Visited (:visited)</p>
    <a href="#">Already Clicked</a>
</div>

<div id="hover-box" class="box">
    <p>Hover (:hover)</p>
    <a href="#">Hover Me</a>
</div>

<div id="active-box" class="box">
    <p>Active (:active)</p>
    <a href="#">Click Me</a>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Selector Margin & Padding</title>
<style>
    /* Semua <p> ikut font asas */
    p {
        font-family: Arial, sans-serif;
        font-size: 20px;
        color: red;
    }

    /* Group 1 - margin & padding 0 */
    #group1 {
        margin: 0px;
        padding: 0px;
        color: rgb(167, 167, 25);
    }

    /* Group 2 - margin & padding 20px */
    #group2 {
        margin: 20px;
        padding: 20px;
        color: rgb(172, 16, 166);
    }

    /* Group 3 - margin & padding 50px */
    #group3 {
        margin: 50px;
        padding: 50px;
        color: rgb(23, 243, 203);
    }
</style>
</head>
<body>

<div id="group1">
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
</div>

<div id="group2">
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
</div>

<div id="group3">
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
    <p>NAMA SAYA MIOR</p>
</div>

</body>
</html>
